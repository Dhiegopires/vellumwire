<html lang="en" class="scroll-smooth">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO Optimization -->
    <title>Vellumwire | High-End Websites That Generate Calls</title>
    <meta name="description"
        content="We rebuild service-business websites with product-level UX, proof-led messaging, and lightweight tracking so visits turn into calls and quote requests.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://vellumwire.com/">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        vw: {
                            base: '#0c0b09',
                            surface: '#1c1a17',
                            accent: '#c6f135',
                            accentHov: '#b0d82e',
                            pri: '#ede9e2',
                            sec: '#8a8680',
                            mut: '#4a4845',
                            border: 'rgba(255,255,255,0.12)'
                        }
                    },
                    fontFamily: {
                        display: ['"Instrument Serif"', 'serif'],
                        ui: ['"Syne"', 'sans-serif'],
                        mono: ['"DM Mono"', 'monospace']
                    }
                }
            }
        }
    </script>

    <!-- External CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

        <!-- Logo -->

            </svg>
        </a>

        <!-- Hamburger Menu -->
        <button class="w-10 h-10 flex flex-col justify-center gap-1.5 focus:outline-none group hover:cursor-pointer">
            <span class="w-6 h-[1.5px] bg-vw-pri group-hover:bg-vw-accent transition-colors self-end"></span>
            <span class="w-8 h-[1.5px] bg-vw-pri group-hover:bg-vw-accent transition-colors self-end"></span>
            <span class="w-4 h-[1.5px] bg-vw-pri group-hover:bg-vw-accent transition-colors self-end"></span>

                    A beautiful website that doesn’t generate calls is a liability.
                </h2>
                <p class="font-ui text-zinc-300 opacity-90 text-[14px] md:text-base font-medium leading-relaxed drop-shadow-md reveal-up mb-6" style="animation-delay: 0.3s;">
                    We rebuild service-business websites with product-level UX, proof-led messaging, and lightweight tracking so your visits turn into qualified calls.
                </p>
                <div class="reveal-up flex flex-wrap items-center justify-start gap-6" style="animation-delay: 0.5s;">
                    <div class="btn-wrapper-glow">
                        <button class="btn btn--sweep" style="padding: 12px 24px; border: none;">
                            Book a Teardown
                            <i data-lucide="arrow-up-right" class="w-4 h-4 ml-1"></i>
                        </button>
                    </div>
                    <div class="flex items-center gap-2 group cursor-pointer" onclick="window.scrollBy({top: 500, behavior: 'smooth'})">
                        <span class="font-ui text-[10px] text-vw-accent uppercase tracking-[0.2em] transition-colors group-hover:text-white">
                            Scroll
                        </span>
                        <i data-lucide="arrow-down" class="w-3 h-3 text-vw-accent group-hover:text-white transition-colors"></i>
                    </div>

    <!-- Init Icons -->
    <script>
        lucide.createIcons();

</html>
